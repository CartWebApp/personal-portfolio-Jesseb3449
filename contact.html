<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Jesse R.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">JR</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
    
  </nav>

  <div class="page-hero">
    <h1>Contact Me</h1>
    <p>Have a question? Send me a message.</p>
  </div>

  <section class="page-section contact-section">
    <div class="contact-wrapper">

      <div class="contact-info">
        <h2>Let's connect</h2>
        <p>I'm currently a CART student open to collaboration, feedback, and opportunities. Fill in the form and I'll get back to you soon.</p>
        <ul class="contact-details">
          <li><span class="contact-icon">📍</span> Fresno, CA</li>
          <li><span class="contact-icon">🎓</span> CART Student</li>
          
        </ul>
      </div>

      <form class="contact-form" name="contact" method="POST" data-netlify="true">
        <input type="hidden" name="form-name" value="contact">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" placeholder="What's on your mind?" required></textarea>
        </div>

        <button type="submit" class="cta-btn">Send Message <span class="btn-arrow">→</span></button>
      </form>

    </div>
  </section>

  <footer class="site-footer">
    <p></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
